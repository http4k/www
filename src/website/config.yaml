baseURL: "https://http4k.org"
languageCode: "en-us"
publishDir: "../../build/www"

title: "http4k"

googleAnalytics: "G-YSM9QLBYXY"

summaryLength: 20

# Hugo 0.163+ tightened the default content security policy to deny text/html
# content files. This site embeds .html files inside content/ as page bundles
# (e.g. ecosystem/http4k/reference/datastar/example.html), so re-enable them.
security:
  allowContent:
    - '.*'

markup:
  asciidocExt:
    attributes:
      sectlinks: true
  goldmark:
    renderer:
      unsafe: true

  highlight:
    style: "monokai"
    lineNos: false

  tableOfContents:
    startLevel: 2
    endLevel: 3

