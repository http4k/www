  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags - manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin - blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec - re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ject-fit:cover;object-position:right top;opacity:0.15;mix-blend-mode:screen;\">\n    <div style=\"position:absolute;top:-160px;right:-80px;width:600px;height:600px;background:radial-gradient(circle, rgba(97,192,255,0.16), transparent 62%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1200px;margin:0 auto;padding:84px 36px 76px;\">\n      <div style=\"max-width:820px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.16em;color:#61C0FF;margin-bottom:20px;\">// PERFORMANCE<\u002Fdiv>\n        <h1 style=\"font-size:56px;line-height:1.03;letter-spacing:-0.03em;font-weight:700;margin:0 0 22px;color:#fff;\">A thin layer over the metal - and it shows.<\u002Fh1>\n        <p style=\"font-size:20px;line-height:1.55;color:#AEBECE;margin:0 0 20px;max-width:660px;\">The http4k server backends are a very thin adapter over the raw server APIs, so they run at very low overhead compared to the bare server. We'll be straight with you though: our north star is developer experience, not topping a leaderboard. Happily, you rarely have to choose.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px 26px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#6E8298;\">\n          <span><span style=\"color:#61C0FF;\">›<\u002Fspan> TechEmpower Round 22<\u002Fspan>\n          <span><span style=\"color:#61C0FF;\">›<\u002Fspan> 13/41 JVM composite<\u002Fspan>\n          <span><span style=\"color:#61C0FF;\">›<\u002Fspan> pluggable backends<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FRAMING -->\n  <section style=\"max-width:1200px;margin:0 auto;padding:72px 36px 0;\">\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.16em;color:#2096F3;margin-bottom:14px;\">// TECH EMPOWER BENCHMARKS<\u002Fdiv>\n        <h2 style=\"font-size:32px;line-height:1.12;letter-spacing:-0.02em;font-weight:700;margin:0 0 16px;color:#0B1622;\">Measured in public, by someone else.<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.68;color:#26323F;margin:0 0 16px;\">http4k is entered into the <a href=\"https://www.techempower.com/benchmarks/\" style=\"color:#2096F3;font-weight:600;\">TechEmpower Framework Benchmarks<\u002Fa> - an independent project that runs frameworks through a series of realistic tests. No custom tuning of the underlying servers: the default app HttpHandler is plugged into each backend, exactly as you'd write it.<\u002Fp>\n        <p style=\"font-size:16.5px;line-height:1.68;color:#26323F;margin:0;\">JVM command-line options were tuned to take advantage of JVM features. The full implementation is public on <a href=\"https://github.com/TechEmpower/FrameworkBenchmarks/tree/master/frameworks/Kotlin/http4k\" style=\"color:#2096F3;font-weight:600;\">GitHub ↗<\u002Fa>.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#0B1622;border-radius:14px;overflow:hidden;border:1px solid #1B2A3B;\">\n        <div style=\"padding:12px 18px;border-bottom:1px solid #1B2A3B;font-family:'JetBrains Mono',monospace;font-size:12px;color:#5E7387;\">benchmark.kt<\u002Fdiv>\n        <div style=\"padding:20px 22px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.9;color:#C7D3E0;overflow-x:auto;\">\n          <div style=\"white-space:pre;\"><span style=\"color:#5E7387;\">// one HttpHandler, every backend<\u002Fspan><\u002Fdiv>\n          <div style=\"white-space:pre;\"><span style=\"color:#61C0FF;\">val<\u002Fspan> app: HttpHandler = routes(<\u002Fdiv>\n          <div style=\"white-space:pre;\">    <span style=\"color:#7FD08A;\">\"/json\"<\u002Fspan> bind GET to { Response(OK)<\u002Fdiv>\n          <div style=\"white-space:pre;\">        .with(jsonLens of Message(<span style=\"color:#7FD08A;\">\"Hello\"<\u002Fspan>)) },<\u002Fdiv>\n          <div style=\"white-space:pre;\">    <span style=\"color:#7FD08A;\">\"/plaintext\"<\u002Fspan> bind GET to {<\u002Fdiv>\n          <div style=\"white-space:pre;\">        Response(OK).body(<span style=\"color:#7FD08A;\">\"Hello, World!\"<\u002Fspan>) }<\u002Fdiv>\n          <div style=\"white-space:pre;\">)<\u002Fdiv>\n          <div style=\"white-space:pre;\"><span style=\"color:#5E7387;\">// → plug into Netty, Jetty, Apache…<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ROUND 22 RESULTS -->\n  <section style=\"max-width:1200px;margin:0 auto;padding:72px 36px 0;\">\n    <div style=\"max-width:720px;margin-bottom:16px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.16em;color:#2096F3;margin-bottom:14px;\">// RESULTS · ROUND 22<\u002Fdiv>\n      <h2 style=\"font-size:34px;line-height:1.1;letter-spacing:-0.02em;font-weight:700;margin:0 0 14px;color:#0B1622;\">Placing 48/159 overall - and top-half of the JVM pack.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.6;color:#5a6577;margin:0;\">Rankings below are filtered to JVM libraries, best backend shown per test. Each links to the live TechEmpower data. Lower rank is better.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- highlight: composite -->\n    <div style=\"border:1px solid #E2E8F1;border-radius:16px;padding:30px 32px;margin-top:24px;background:#F8FAFD;\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;\">\n        <div>\n          <h3 style=\"font-size:20px;font-weight:700;margin:0 0 4px;color:#0B1622;\">Composite ranking<\u002Fh3>\n          <span style=\"font-size:14.5px;color:#5a6577;\">The headline, all-round score across every test type.<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"https://www.techempower.com/benchmarks/#section=data-r22&amp;hw=ph&amp;test=composite\" style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#2096F3;font-weight:600;\">view data ↗<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:150px 1fr 84px;gap:16px;align-items:center;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:13.5px;color:#43505F;text-align:right;\">Top rank<\u002Fdiv>\n        <div style=\"height:30px;background:#E7EEF6;border-radius:7px;overflow:hidden;\"><div style=\"height:100%;width:32%;background:#EE7D2B;border-radius:7px;animation:h4kBarGrow 1s cubic-bezier(0.2,0.7,0.2,1);display:flex;align-items:center;padding-left:12px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;\">13 / 41 JVM<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#0B1622;text-align:right;\">13/41<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- per-test bars -->\n    <div style=\"border:1px solid #E2E8F1;border-radius:16px;padding:30px 32px;margin-top:20px;\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;\">\n        <h3 style=\"font-size:20px;font-weight:700;margin:0;color:#0B1622;\">By test type<\u002Fh3>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#9AA7B6;\">top JVM rank · best backend<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <sc-for list=\"{{ tests }}\" as=\"t\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid;grid-template-columns:210px 1fr 132px;gap:16px;align-items:center;\">\n            <div style=\"font-size:14.5px;color:#0B1622;font-weight:600;\">{{ t.label }}<\u002Fdiv>\n            <div style=\"height:24px;background:#F1F5F9;border-radius:7px;overflow:hidden;\">\n              <div style=\"height:100%;width:{{ t.pct }};background:{{ t.colour }};border-radius:7px;animation:h4kBarGrow 1s cubic-bezier(0.2,0.7,0.2,1);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:#0B1622;\">{{ t.rank }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.6;color:#9AA7B6;margin:22px 0 0;\">Backends &amp; drivers vary per test (Apache, Jetty Loom, Netty; PostgreSQL / Vert.x with a Hikari pool; Rocker templating). See the <a href=\"https://www.techempower.com/benchmarks/#section=data-r22\" style=\"color:#2096F3;font-weight:600;\">full Round 22 data ↗<\u002Fa>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ETHOS (INK) -->\n  <section style=\"background:#0B1622;color:#E6EDF5;position:relative;overflow:hidden;margin-top:72px;\">\n    <div style=\"position:absolute;top:-120px;left:-60px;width:480px;height:480px;background:radial-gradient(circle, rgba(97,192,255,0.13), transparent 62%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1000px;margin:0 auto;padding:72px 36px;text-align:center;\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.16em;color:#61C0FF;margin-bottom:16px;\">// THE HONEST BIT<\u002Fdiv>\n      <h2 style=\"font-size:34px;line-height:1.14;letter-spacing:-0.02em;font-weight:700;margin:0 0 16px;color:#fff;\">We optimise for developer experience first.<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.62;color:#A9BACB;margin:0 auto;max-width:680px;\">Chasing the very top of a benchmark table tends to produce hostile, un-http4k-like APIs. We'd rather give you friendly, testable, composable code that still lands comfortably in the top half of the JVM pack. For the vast majority of real systems, http4k is nowhere near your bottleneck - your database is.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RECOMMENDATIONS + CTA -->\n  <section style=\"max-width:1080px;margin:0 auto;padding:72px 36px 96px;\">\n    <div style=\"display:flex;gap:14px;align-items:flex-start;background:#FFF7F0;border:1px solid #F1DFC4;border-left:3px solid #EE7D2B;border-radius:12px;padding:22px 24px;margin-bottom:40px;\">\n      <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:15.5px;color:#0B1622;white-space:nowrap;\">Benchmark your own app.<\u002Fspan>\n      <span style=\"font-size:15px;line-height:1.6;color:#5a6577;\">TechEmpower simulates simple real-world scenarios, but your app can behave drastically differently. If performance is critical, try different engines with your own workload - and remember startup time varies a lot between backends too.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"background:#0B1622;border-radius:22px;padding:56px 50px;position:relative;overflow:hidden;text-align:center;\">\n      <div style=\"position:absolute;top:-130px;left:50%;transform:translateX(-50%);width:720px;height:400px;background:radial-gradient(ellipse, rgba(97,192,255,0.2), transparent 65%);\"><\u002Fdiv>\n      <div style=\"position:relative;\">\n        <h2 style=\"font-size:34px;line-height:1.08;letter-spacing:-0.03em;font-weight:700;margin:0 0 16px;color:#fff;\">Pick the backend, keep the code.<\u002Fh2>\n        <p style=\"font-size:17.5px;line-height:1.55;color:#A9BACB;margin:0 auto 30px;max-width:520px;\">Swap Netty for Jetty Loom for Apache with one line, and benchmark what actually matters: your app.<\u002Fp>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;justify-content:center;\">\n          <a href=\"Docs.dc.html\" style=\"display:inline-flex;align-items:center;height:52px;padding:0 26px;background:#EE7D2B;color:#fff;border-radius:11px;font-weight:600;font-size:16px;\" style-hover=\"background:#D9661A;\">Explore the backends<\u002Fa>\n          <a href=\"Overview.dc.html\" style=\"display:inline-flex;align-items:center;height:52px;padding:0 24px;background:rgba(255,255,255,0.05);color:#fff;border:1px solid #2C4156;border-radius:11px;font-weight:600;font-size:16px;\" style-hover=\"border-color:#61C0FF;color:#61C0FF;\">Read the ethos<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0B1622;color:#A9BACB;border-top:1px solid #16222F;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:54px 36px 34px;display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <img src=\"3faba1e9-cd45-4554-905f-9bcb6e2b1f17\" alt=\"http4k\" style=\"height:22px;width:auto;display:block;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#61C0FF;\">Peace out. // the http4k team<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:24px;font-size:14px;\">\n        <a href=\"Homepage Bold v2.dc.html\" style-hover=\"color:#fff;\">Home<\u002Fa>\n        <a href=\"Docs.dc.html\" style-hover=\"color:#fff;\">Docs<\u002Fa>\n        <a href=\"Overview.dc.html\" style-hover=\"color:#fff;\">Overview<\u002Fa>\n        <a href=\"News.dc.html\" style-hover=\"color:#fff;\">News<\u002Fa>\n        <a href=\"https://github.com/http4k\" style-hover=\"color:#fff;\">GitHub<\u002Fa>\n      <\u002Fdiv>\n      <span style=\"font-size:13px;color:#5E7387;font-family:'JetBrains Mono',monospace;\">© 2026 http4k Ltd<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const H = '#2096F3';\n    // pct is a visual scale - smaller rank = fuller/better bar. Ranks are the real Round 22 figures.\n    const tests = [\n      { label: 'DB query + HTML render', rank: '25/146', pct: '83%', colour: H, note: 'Apache backend' },\n      { label: 'Multiple DB queries', rank: '23/145', pct: '85%', colour: H, note: 'Jetty Loom' },\n      { label: 'Single DB query', rank: '25/151', pct: '84%', colour: H, note: 'Apache backend' },\n      { label: 'Random DB updates', rank: '41/138', pct: '70%', colour: H, note: 'Jetty Loom' },\n      { label: 'JSON serialization', rank: '59/152', pct: '62%', colour: H, note: 'Netty backend' },\n      { label: 'Plaintext pipelining', rank: '84/153', pct: '46%', colour: '#9AA7B6', note: 'Netty backend' },\n    ];\n    return { tests };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
