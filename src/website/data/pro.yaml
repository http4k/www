modules:
  - name: Verify
    link: https://verify.http4k.org
    image: verify.webp
    description: Automatic build-time verification of http4k artifact signatures, SBOMs, SLSA provenance, and license reports
    prompt: "A clean isometric illustration of a minimalist shield with a checkmark badge hovering above a stack of software artifacts (JARs), with thin verification lines connecting each artifact to the shield. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: Wiretap
    link: https://wiretap.http4k.org
    image: wiretap.webp
    description: OpenTelemetry trace capture and HTML test reports with Wiretap Intercept, plus real-time traffic monitoring, chaos engineering, and MCP debugging with Wiretap Console
    prompt: "A clean isometric illustration of a magnifying glass hovering over flowing data streams or network cables, with small request/response packet shapes visible through the lens. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: Model Context Protocol
    link: https://mcp.http4k.org
    image: mcp.webp
    description: Build MCP servers and MCP Apps to integrate Large Language Models with your data and tools
    prompt: "A clean isometric illustration of a minimalist server room with a glowing neural network node connected to simple data blocks via thin lines. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: Agent2Agent
    link: https://a2a.http4k.org
    image: a2a.webp
    description: Build interoperable AI agent systems with Google's A2A protocol - Agent Cards, Tasks, Streaming, and Push Notification
    prompt: "A clean isometric illustration of two AI agent figures exchanging messages across a bridge, with task cards and notification icons flowing between them. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: WebAuthn
    link: https://webauthn.http4k.org
    image: webauthn.webp
    description: Passwordless authentication with FIDO2 passkeys - full WebAuthn registration and authentication ceremonies, pluggable verification and storage
    prompt: "A clean isometric illustration of a minimalist passkey or security key token hovering above a login card, with a fingerprint motif and a small unlocked padlock connected by thin lines. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: Machine Payments Protocol
    link: https://payments.http4k.org
    image: mpp.webp
    description: Scalable machine-to-machine payment infrastructure for automated digital commerce between services
    prompt: "A clean isometric illustration of a network of small connected nodes with tiny currency symbols flowing along the paths between them, set on a simple grid surface. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: X402 Payments
    link: https://payments.http4k.org
    image: x402.webp
    description: HTTP 402-based payment protocol enabling machine-to-machine commerce with automatic micropayment negotiation
    prompt: "A clean isometric illustration of two minimalist server towers exchanging a small coin token across a bridge or conduit between them. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: true
  - name: Server Hot Reload
    link: https://hotreload.http4k.org
    image: hotreload.webp
    available: true
    description: Hot Reload automatically restarts your server after code changes, saving you time during development
    prompt: "A clean isometric illustration of a minimalist laptop with a circular refresh arrow hovering above the screen, beside a small code editor window. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
  - name: Storyboard
    link: https://storyboard.http4k.org
    image: storyboard.webp
    description: Turn http4k tests into living visual stories - HTTP exchanges, WebDriver interactions, SQL queries, and author narration captured as navigable slideshows or scrollable pages
    prompt: "A clean isometric illustration of a single wide open storyboard pad or document seen from a slight angle. Its surface is arranged with five clearly distinct content panels laid out in narrative reading order, each visually unique: (1) a browser window with a header bar and a wireframe page inside, (2) a syntax-highlighted code snippet with green and blue keyword colouring and visible indentation, (3) a labelled flowchart with three connected node shapes and arrows between them, (4) a small data table grid with visible rows and column dividers, (5) a thumbnail screenshot card with a tiny UI mockup. Each panel has distinct proportions, internal contents, and visual texture - no two look alike. The whole image reads as heterogeneous test artifacts collected onto a single living document. Muted palette: soft greys, pale blues, and white, with subtle accent hues differentiating each panel type. Light ambient shadows. No text or characters anywhere in the image. Square format."
    available: false
  - name: Transactional Outbox
    link: https://outbox.http4k.org
    image: outbox.webp
    description: A robust transactional outbox implementation for http4k that ensures reliable message delivery with database consistency.
    prompt: "A clean isometric illustration of a minimalist database cylinder with small envelopes queued in an orderly line flowing outward into a delivery chute. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: false
  - name: BackOffice
    link: https://backoffice.http4k.org
    image: backoffice.webp
    description: Secure & audited API Gateway for developers and MCP tools to connect to your OpenAPI-powered services
    prompt: "A clean isometric illustration of a minimalist shield with several thin API pathway lines converging through a small gateway opening at its centre. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
    available: false
packs:
  - name: Agents Pack
    link: https://agents.http4k.org
    image: agents.webp
    prompt: "A clean isometric illustration of four interconnected modules arranged in a diamond pattern on a floating platform: a glowing neural network node
  (MCP), two small robots linked by a bridge exchanging task cards (A2A), a magnifying glass over data streams (Wiretap), and two server towers exchanging a coin token (X402/MPP) - all connected by thin luminous lines converging to a central hub. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
  - name: Machine Payments Pack
    link: https://payments.http4k.org
    image: payments.webp
    prompt: "A clean isometric illustration of two interconnected modules on a floating platform: a pair of minimalist server towers exchanging a small coin token across a bridge (X402), alongside a network of small connected nodes with tiny currency symbols flowing along paths between them on a simple grid (MPP)
   - both linked by thin luminous lines converging to a central payment hub. Muted palette: soft greys, pale blues, and white. Light ambient shadows, no text. Square format."
