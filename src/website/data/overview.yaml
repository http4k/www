principles:
  - title: "Functional & immutable"
    description: "Built on simple functional concepts, embracing immutability throughout."
  - title: "Symmetric API"
    description: "The same \"Server as a Function\" model for both server and client."
  - title: "Absolutely no magic"
    description: "No reflection. No annotations. No bytecode surprises. What you read is what runs."
  - title: "Lightweight"
    description: "Minimal dependencies - beyond the Kotlin StdLib, http4k-core has exactly zero."
  - title: "Test-driven"
    description: "Testable outside any HTTP container, with no custom infrastructure needed."
  - title: "Starts & stops fast"
    description: "Ultra-quick start/stop times - ideal for serverless and rapid test cycles."
  - title: "Typesafe messages"
    description: "Typesafe HTTP message construction and deconstruction via Lenses."
  - title: "No boilerplate"
    description: "Contract breaches are dealt with automatically, removing reams of boilerplate."
  - title: "Specs from code"
    description: "Typed routes generate the OpenAPI spec and JSON Schema, so docs never drift from what runs."

credits:
  - kick: "ROUTING"
    name: "UtterlyIdle"
    url: "https://github.com/bodar/utterlyidle"
    description: "The shape of the routing module - and what convinced us that simple was possible."
  - kick: "MODEL"
    name: "Finagle"
    url: "https://twitter.github.io/finagle"
    description: "\"Server as a Function\" and the filter model - the underlying concept for everything."
  - kick: "OUR V1"
    name: "Fintrospect"
    url: "http://github.com/daviddenton/fintrospect"
    description: "http4k's Scala-based ancestor. Everyone agreed it was too complex - so we threw it out and started again in Kotlin."

payoff:
  - title: "Test without a container"
    description: "Wire entire suites of services together without HTTP, or spin them up in containers with a single line. No custom infrastructure required."
  - title: "Fake any contract"
    description: "Because a client is just a function, a Fake server for any HTTP contract is trivial. With CDC suites, you can end-to-end test microservices outside-in, GOOS-style."
  - title: "Model the nasty scenarios"
    description: "\"What if this dependency takes >5s, every time?\" Easy to model - and impossible to answer if you fake things inside the HTTP boundary."
