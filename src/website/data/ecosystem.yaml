- title: http4k Core
  description: The core ecosystem is the foundation of the http4k project, providing the **essential building blocks** for creating HTTP servers and clients. This ecosystem is designed to be lightweight, efficient, and testable, making it ideal for building reliable, high-performance applications.
  image: "/images/logo-http4k.png"
  ref: http4k
  family: true
  badge: Apache 2.0
  tagline: "The foundation: server-as-a-function, routing, typesafe lenses, clients, formats and a testing toolkit. Zero dependencies, runs on any backend."
  chips: [Servers, Clients, Routing, OpenAPI, Testing, WebSockets]
- title: http4k AI
  description: http4k AI is a **collection of libraries and tools** that enable developers to integrate AI capabilities into their applications. It provides a simple and intuitive API for working with AI models, making it easy to add intelligent features to your applications.
  image: "/images/logo-ai.png"
  ref: ai
  family: true
  badge: Apache 2.0
  tagline: Lightweight adapters for LLM providers and AI services - with full Fake implementations so you can test AI integrations offline, deterministically and for free.
  chips: [OpenAI, MCP, A2A, LLM adapters, Fakes]
- title: http4k Connect
  description: http4k Connect is designed to facilitate seamless **integration with external systems and services** from the client viewpoint. It is optimised for zero-reflection, ideal for native and serverless use. It ships with in-memory fakes for testing without Docker and keeps dependencies minimal for small binary sizes.
  image: "/images/logo-connect.png"
  ref: connect
  family: true
  badge: Apache 2.0
  tagline: Typed, lightweight clients for popular cloud & SaaS APIs, each with a stateful in-memory Fake - so you can plug everything together and test without touching real infrastructure.
  chips: [S3, DynamoDB, SQS, Redis, Fakes]
- title: http4k Pro
  description: Enterprise-ready capabilities for teams building scalable, mission-critical applications. Commercially licensed extensions enabling enhanced security, monitoring, and reliability features. Pro modules are available to license standalone or are automatically included as part of the **[http4k Enterprise Edition](/enterprise)**.
  image: "/images/pro.png"
  ref: pro
  family: true
  badge: Commercial
  tagline: Commercially-licensed power tools for teams running http4k for real - free for individuals and small teams.
  chips: [Wiretap, WebAuthn, MCP, X402, Hot Reload]
- title: http4k Enterprise
  description: All Pro modules, **Long-Term Support** releases, and **supply chain security tooling** - for organisations that need verified dependencies, compliance evidence, and the assurance that every http4k artifact is signed, traceable, and auditable.
  image: "/images/logo-enterprise.webp"
  ref: enterprise
