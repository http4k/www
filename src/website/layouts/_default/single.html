{{ define "main" }}

<div class="prose-page">
    {{ with .Params.eyebrow }}{{ partial "shared/eyebrow.html" . }}{{ end }}
    <h1 class="reading__title">{{ .Title }}</h1>
    {{ with .Params.description }}<p class="reading__lede">{{ . }}</p>{{ end }}
    <div class="article-body">
        {{ .Content }}
    </div>
    {{ with .Params.tags }}
    <ul class="prose-page__tags">
        {{ range . }}<li><a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}">{{ . }}</a></li>{{ end }}
    </ul>
    {{ end }}
</div>

{{ end }}
