{{ define "main" }}

<section class="error-404 ink-hero">
    <div class="ink-hero__glow"></div>
    <div class="error-404__inner">
        <div class="error-404__eyebrow">// NOT FOUND</div>
        <div class="error-404__code">4<span>0</span>4</div>
        <p class="error-404__msg">This page has gone missing. Looks like a pipe got disconnected - let's get you back on track.</p>
        <a class="cta-btn cta-btn--primary" href="/">Back to safety</a>
    </div>
</section>

<script>
    (function () {
        if (typeof gtag !== "function") return;
        gtag("event", "page_not_found", {
            attempted_path: window.location.pathname + window.location.search,
            attempted_referrer: document.referrer || "(none)",
        });
    })();
</script>

{{ end }}
