{{/* Dark ink hero for section-landing / pitch pages. Params: eyebrow, title, lede. */}}
<section class="ink-hero section-hero">
    <div class="ink-hero__glow"></div>
    <div class="container section-hero__inner">
        {{ with .eyebrow }}{{ partial "shared/eyebrow.html" . }}{{ end }}
        <h1 class="hero-title">{{ .title }}</h1>
        {{ with .lede }}<p class="hero-sub">{{ . | safeHTML }}</p>{{ end }}
    </div>
</section>
