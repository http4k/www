<section class="solution-cta">
    <div class="solution-cta__inner">
        <div class="section-head section-head--center">
            <div class="eyebrow">// PROFESSIONAL SERVICES</div>
            <h2 class="section-h2">Professional Services</h2>
        </div>
        <div class="solution-cta__grid">
            {{ range site.Data.cta }}
            <div class="solution-cta-card">
                <h3>{{ .title }}</h3>
                <p>{{ .description | markdownify }}</p>
                <a href="{{ .link }}">{{ .text }} &rarr;</a>
            </div>
            {{ end }}
        </div>
    </div>
</section>
