{{- with .Site.Params.newsletter }}{{ with .action }}
<section class="newsletter-wrap">
  <div class="newsletter">
    <div class="newsletter__copy">
      <h2>Get it in your inbox, not your algorithm.</h2>
      <p>New releases and the occasional opinion. No spam, no "growth hacking", unsubscribe whenever.</p>
    </div>
    <form class="newsletter__form" action="{{ . }}" method="post">
      <input class="newsletter__input" type="email" name="email" placeholder="you@company.com" required>
      <button class="newsletter__btn" type="submit">Subscribe</button>
    </form>
  </div>
</section>
{{ end }}{{ end }}
