{{ define "main" }}
<div class="layout">
    <main class="page-content">
        <header>
            <img src="/images/pro.png" class="imageMid mt-3" alt="{{ .Title }}">
        </header>
        <article>
            <div class="mt-4 mb-4">
                {{ .Content }}
            </div>
            <hr/>
            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4 mt-5 pb-4 justify-content-center">
                {{ range .Params.modules }}
                <div class="col">
                    <div class="card h-100 text-center">
                        <div class="p-3">
                            <img src="/images/{{ .image }}" alt="{{ .name }}" class="rounded" style="width: 100%; aspect-ratio: 1; object-fit: cover;"/>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{{ .name }}</h5>
                            <p class="card-text small">{{ .description }}</p>
                            <div class="mt-auto pt-3">
                                {{ if .available }}
                                <a href="{{ .link }}" class="btn btn-secondary w-100">See more</a>
                                {{ else }}
                                <a href="{{ .link }}" class="btn btn-secondary w-100">Coming soon...</a>
                                {{ end }}
                            </div>
                        </div>
                    </div>
                </div>
                {{ end }}
            </div>
        </article>
    </main>
</div>

{{ partial "shared/faq.html" . }}

{{ partial "shared/cta-width.html" . }}

{{ partial "shared/pipes.html" }}

{{ end }}
