{{ define "main" }}

<div class="layout">
    <main class="page-content">
        <header>
            <h1>{{ .Title }}</h1>
        </header>
        <article>
            <div class="text-muted mt-3 mb-4" style="text-align: right;">{{ .Params.date | time.Format "January 2006" }}</div>
            <div>
                {{ .Content }}
            </div>
            {{ with .Params.tags }}
            <div>
                <ul id="tags">
                    {{ range . }}
                    <li><a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}">{{ . }}</a></li>
                    {{ end }}
                </ul>
            </div>
            {{ end }}
        </article>
        <div class="mt-auto d-flex justify-content-center pb-5">
            <script async data-uid="33ef03f749" src="https://http4k.kit.com/33ef03f749/index.js"></script>
        </div>
        <div class="mt-auto d-flex justify-content-center">
            <a href="../" class="btn btn-primary">All News</a>
        </div>

    </main>

</div>
{{ end }}
